services:
  wg-easy:
    #environment:
    #  Optional:
    #  - WEB_PORT=51821
    #  - HOST=0.0.0.0
    #  - INSECURE=false
    #
    # Published host IPs for WEB_PORT and AWG_PORT are generated by Makefile.
    #
    # Docker network settings:
    #  - WG_IPV4_SUBNET=10.10.0.0/24
    #  - WG_IPV4_ADDRESS=10.10.0.10
    #  - WG_IPV6_SUBNET=fdcc:ad94:bacf:61a3::/64
    #  - WG_IPV6_ADDRESS=fdcc:ad94:bacf:61a3::2a

    image: ${IMAGE:?IMAGE is required}
    container_name: wg-easy
    environment:
      - INIT_ENABLED=${INIT_ENABLED:?INIT_ENABLED is required}
      - INIT_IPV4_CIDR=${INIT_IPV4_CIDR:?INIT_IPV4_CIDR is required}
      - INIT_IPV6_CIDR=${INIT_IPV6_CIDR:?INIT_IPV6_CIDR is required}
      - INSECURE=${INSECURE:?INSECURE is required}
      - WEB_PORT=${WEB_PORT:?WEB_PORT is required}
      - AWG_PORT=${AWG_PORT:?AWG_PORT is required}
    networks:
      wg:
        ipv4_address: ${WG_IPV4_ADDRESS:?WG_IPV4_ADDRESS is required}
        ipv6_address: ${WG_IPV6_ADDRESS:?WG_IPV6_ADDRESS is required}
    volumes:
      - ./db:/db
      - ./config/wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      # - NET_RAW # ⚠️ Uncomment if using Podman
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1

networks:
  wg:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: ${WG_IPV4_SUBNET:?WG_IPV4_SUBNET is required}
        - subnet: ${WG_IPV6_SUBNET:?WG_IPV6_SUBNET is required}
